<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Streetwise — Review</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Founder eval tool, not the product surface: utilitarian on purpose. -->
  <style>
    body { font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
           margin: 0; padding: 1rem 1.5rem; background: #111; color: #ddd; }
    h1 { font-size: 1rem; margin: 0 0 .75rem; color: #fff; }
    #stats { white-space: pre-wrap; background: #1a1a1a; border: 1px solid #333;
             padding: .75rem; margin-bottom: 1rem; font-size: 12px; color: #9c9; }
    #progress { margin: 0 0 .5rem; color: #888; }
    .pair { display: flex; gap: 1rem; flex-wrap: wrap; }
    .pane { flex: 1 1 320px; min-width: 0; }
    .pane h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
               color: #888; margin: 0 0 .25rem; }
    pre { background: #1a1a1a; border: 1px solid #333; padding: .75rem;
          overflow-x: auto; white-space: pre-wrap; word-break: break-word;
          max-height: 24rem; margin: 0; }
    .no-event { color: #fa0; }
    #verdicts { margin-top: 1rem; display: flex; gap: .5rem; flex-wrap: wrap; }
    button { font: inherit; padding: .5rem .9rem; background: #222; color: #ddd;
             border: 1px solid #444; cursor: pointer; }
    button:hover { background: #333; }
    button.correct { border-color: #2a6; }
    button.wrong { border-color: #a33; }
    #done { color: #6c6; font-size: 1rem; margin-top: 1rem; }
    .hint { color: #666; font-size: 12px; margin-top: .5rem; }
  </style>
</head>
<body>
  <h1>/review — grade extractions <a href="/" style="color:#69f;float:right;font-weight:normal">map →</a></h1>
  <div id="stats">loading stats…</div>
  <p id="progress"></p>
  <div id="item" hidden>
    <div class="pair">
      <div class="pane"><h2>raw source item</h2><pre id="payload"></pre></div>
      <div class="pane"><h2>claude extracted</h2><pre id="extraction"></pre></div>
    </div>
    <div id="verdicts">
      <button class="correct" data-verdict="correct">1 · correct</button>
      <button class="wrong" data-verdict="wrong_event">2 · wrong event</button>
      <button class="wrong" data-verdict="wrong_location">3 · wrong location</button>
      <button class="wrong" data-verdict="wrong_summary">4 · wrong summary</button>
    </div>
    <p class="hint">keys 1–4 · for items Claude ignored (no extraction), “correct” = correctly ignored</p>
  </div>
  <p id="done" hidden>Queue empty — nothing unreviewed.</p>
  <script src="review.js"></script>
</body>
</html>
